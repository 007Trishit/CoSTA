model:
  type: CCD
  step_size_type: t2
  scaling: true
  blind: true
  param_multi_conv:
      num_channels:
      - 3
      - 64
      size_kernels:
      - 3
      zero_mean: false
  param_spline_activation:
      mode: conv
      size: 101
      range_: 1.0
      init: zero
      slope_min: 0.0
      slope_max: 1.0
  param_spline_scaling:
      num_knots: 11
      x_min: 0.0
      x_max: 25.0
      init: 5.0
      slope_min: null
      slope_max: null
      clamp: false
training:
  color_mode: rgb
  sigma_min: 0.0
  sigma_max: 25.0
  patch_size: 128
  batch_size: 16
  epochs: 100000
  loss: mse
  seed: 42
  tau_lb: 0.0102
  tau_ub: 0.135
  optimizer: Adam
  lr: 0.05
  lr_diff: true
  # lr_conv: null
  # lr_spline_act: null
  # lr_spline_scal: null
  sch: cosine
  milestones_divider: 5
  lr_gamma: 0.5
  val_crop_size: 256
  val_freq: 10000
  save_freq: 10000
  out_folder: pretrained/ccd/mse/color/k3_l1_t2_scaling_cosine_blind
  in_folder: data
  train_ds_ver: '2'
  gpu_id: 0
  no_normalize_pixels: false
